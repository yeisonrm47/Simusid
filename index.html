    <title>SIMUSID — Sistema de Identificación Dactiloscópica</title>
    <style id="simusid-theme">
      /* ── SIMUSID · paleta para fatiga visual (modo dia / modo noche) ──
         Diseno basado en evidencia:
         - Sin blanco puro (#fff) ni negro puro (#000): se suavizan los
           extremos para evitar el deslumbramiento y el "halation".
           (WCAG 2.2; guias de contraste 2025-2026)
         - Texto/fondo conservan contraste >= 4.5:1 (WCAG 2.1 AA, 1.4.3).
         - Modo noche con grises profundos y texto hueso (~13:1) en vez de
           21:1, mas comodo en penumbra (NN/g; estudios de polaridad).
         - Las anotaciones dibujadas sobre la huella NO se tinen (fidelidad
           forense): viven en hex crudo fuera de estas variables.            */

        color-scheme: light;
        --c-00007a: #00007a;
        --c-000082: #000082;

      html, body { background: var(--n-d4d0c8-fg); }
      /* transicion suave al alternar tema (no afecta al canvas) */
      body * { transition: background-color .18s ease, color .18s ease, border-color .18s ease; }

  </head>
  <body style="margin:0">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      /* aplica el tema guardado (o la preferencia del sistema) antes de pintar */
      (function(){
        try{
          var t = localStorage.getItem("simusid-theme");
          if(!t) t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", t);
        }catch(e){ document.documentElement.setAttribute("data-theme","light"); }
      })();
    </script>
  </body>
