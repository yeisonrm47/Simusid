    <title>SIMUSID — Sistema de Identificación Dactiloscópica</title>
    <style id="simusid-theme">
      /* ── SIMUSID · paleta neutra anti-fatiga (modo día / modo noche) ──
         Rediseño con criterio de confort visual prolongado:
         - Sin blanco puro (#fff) ni negro puro (#000): evita deslumbramiento
           y "halation" del texto (WCAG 2.2; guías de confort 2025-2026).
         - Paleta de matices REDUCIDA y desaturada: se sustituye el arcoíris
           de acentos (azul/verde/rojo/amarillo/naranja/morado saturados) por
           una familia sobria — pizarra-teal (primario), salvia (éxito),
           arcilla (peligro), ocre (aviso). Menos cromatismo = menos esfuerzo
           de acomodación ocular y lectura más calmada.
         - Contraste de texto >= 4.5:1 en superficies (WCAG 2.1 AA, 1.4.3).
         - Modo noche: grises profundos con texto hueso y acentos pastel en
           banda cómoda (~7-10:1), no el 21:1 que cansa en penumbra.
         - Las anotaciones dibujadas sobre la huella NO se tiñen (fidelidad
           forense): viven en hex crudo fuera de estas variables.            */

        color-scheme: light;
        --c-00007a: #2f5763;
        --c-000082: #345862;

      /* transicion suave al alternar tema (no afecta al canvas) */
      body * { transition: background-color .18s ease, color .18s ease, border-color .18s ease; }

  <body style="margin:0">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      /* aplica el tema guardado (o la preferencia del sistema) antes de pintar */
      (function(){
        try{
          var t = localStorage.getItem("simusid-theme");
          if(!t) t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", t);
        }catch(e){ document.documentElement.setAttribute("data-theme","light"); }
      })();
    </script>
  </body>
